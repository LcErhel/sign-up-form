<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./javascript.js" defer></script>
</head>
<body>
    <div class="image-wrapper">
        <img class="background-image" src="./assets/halie-west.jpg" alt="">
        <div>ODIN</div>
        <div class="unsplash">Photo by Halie West on Unsplash</div>
    </div>
    <div class="form-wrapper">
        <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
            <br>Sign up <em>now</em> to get started</h2>
        <h2>You know you want to.</h2>
        <form id="myForm" action="" method="post">
            <legend>Let's do this!</legend>
            <div class="group-wrap">
                <div class="input-wrap">
                    <label for="firstName">First name</label>
                    <input type="text" name="firstName" id="firstName">
                </div>
                <div class="input-wrap">
                    <label for="lastName">Last name</label>
                    <input type="text" name="lastName" id="lastName">
                </div>
            </div>
            <div class="group-wrap">
                <div class="input-wrap">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" >
                </div>
                <div class="input-wrap">
                    <label for="tel">Phone number</label>
                    <input type="tel" name="tel" id="tel">
                </div>
            </div>
            <div class="group-wrap">
                <div class="input-wrap">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                    <span id="inform">* Passwords do not match</span>
                </div>
                <div class="input-wrap">
                    <label for="passwordConfirm">Confirm password</label>
                    <input type="password" name="passwordConfirm" id="passwordConfirm" required>
                </div>
            </div>
        </form>
        <div>
            <button type="button" form="myForm" id="registerButton">Create Account</button>
        </div>
        <div class="login">
            Already have an account? <a href="">Log in</a>
        </div>
    </div>
</body>
</html>
